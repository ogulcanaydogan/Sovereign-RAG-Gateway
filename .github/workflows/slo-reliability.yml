name: slo-reliability

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "45 7 * * 1"

permissions:
  contents: read

jobs:
  evaluate-slo-reliability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run governance benchmark baseline
        run: |
          uv run python scripts/benchmark_runner.py \
            --scenario enforce_redact \
            --dataset benchmarks/data/synthetic_prompts.jsonl \
            --out artifacts/benchmarks/governance

      - name: Run deterministic fault injection suite
        run: |
          uv run python scripts/run_fault_injection_suite.py \
            --dataset benchmarks/data/synthetic_prompts.jsonl \
            --out-dir artifacts/fault-injection

      - name: Run 30-minute mixed-tenant soak profile
        run: |
          uv run python scripts/benchmark_runner.py \
            --scenario soak_mixed_tenant_30m \
            --dataset benchmarks/data/synthetic_prompts.jsonl \
            --out artifacts/soak
          cp artifacts/soak/results_summary.json artifacts/soak/soak-summary.json

      - name: Evaluate SLO reliability gate
        run: |
          uv run python scripts/check_slo_reliability.py \
            --benchmark-summary artifacts/benchmarks/governance/results_summary.json \
            --fault-summary artifacts/fault-injection/fault-summary.json \
            --soak-summary artifacts/soak/soak-summary.json \
            --baseline-summary benchmarks/baselines/governance_enforce_redact_summary.json \
            --max-error-rate 0.01 \
            --max-p95-regression-pct 10 \
            --max-nominal-shed-rate 0.02 \
            --json-report artifacts/slo-reliability/slo-reliability-summary.json

      - name: Upload reliability artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slo-reliability-${{ github.run_id }}
          path: |
            artifacts/benchmarks/governance/results_summary.json
            artifacts/fault-injection/fault-summary.json
            artifacts/soak/soak-summary.json
            artifacts/slo-reliability/slo-reliability-summary.json
