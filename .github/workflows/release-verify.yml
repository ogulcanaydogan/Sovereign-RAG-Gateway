name: release-verify

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * 1"

permissions:
  contents: read

jobs:
  verify-latest-release-assets:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify latest release evidence assets
        run: |
          python scripts/check_release_assets.py \
            --repo "${GITHUB_REPOSITORY}" \
            --latest \
            --verify-bundle-integrity \
            --verify-signature \
            --require-public-key

      - name: Verify latest 10 releases (strict integrity sweep)
        run: |
          python scripts/check_release_assets.py \
            --repo "${GITHUB_REPOSITORY}" \
            --latest-count 10 \
            --verify-bundle-integrity \
            --verify-signature \
            --require-public-key \
            --allow-legacy-evidence-gap-before-tag v0.3.0 \
            --allow-legacy-public-key-gap-before-tag v0.7.0-alpha.1 \
            --enforce-prerelease-flag-parity \
            --json-report artifacts/release-verify-sweep.json

      - name: Verify release evidence contract drift (latest 10)
        run: |
          python scripts/check_release_evidence_contract.py \
            --repo "${GITHUB_REPOSITORY}" \
            --latest-count 10 \
            --allow-legacy-before-tag v0.3.0 \
            --json-report artifacts/release-evidence-contract-sweep.json

      - name: Upload release verification sweep report
        uses: actions/upload-artifact@v4
        with:
          name: release-verify-sweep-${{ github.run_id }}
          path: artifacts/release-verify-sweep.json

      - name: Upload release evidence contract report
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-contract-sweep-${{ github.run_id }}
          path: artifacts/release-evidence-contract-sweep.json
